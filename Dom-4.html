<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details Popup</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #productContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            width: 220px;
            border: 1px solid gray;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .card img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            width: 450px;
            background: white;
            margin: 60px auto;
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }

        .modal-content img {
            width: 200px;
            display: block;
            margin: auto;
        }

        #close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <h2>Fake Store Products</h2>

    <div id="productContainer"></div>

    <!-- Modal -->
    <div id="modal" class="modal">

        <div class="modal-content">

            <span id="close">&times;</span>

            <div id="modalBody"></div>

        </div>

    </div>

    <script src="product Details Pop-up.js"></script>

</body>

</html>
