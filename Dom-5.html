<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #productContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            width: 220px;
            border: 1px solid gray;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
        }

        .card img {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        #cart {
            margin-top: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table,
        th,
        td {
            border: 1px solid gray;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }
    </style>

</head>

<body>

    <div class="header">

        <h2>Shopping Cart</h2>

        <h3>🛒 Cart (<span id="cartCount">0</span>)</h3>

    </div>

    <div id="productContainer"></div>

    <h2>Your Cart</h2>

    <div id="cart"></div>

    <script src="Shopping Cart.js"></script>

</body>

</html>
